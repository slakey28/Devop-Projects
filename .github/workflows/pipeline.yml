name: DevSecOps Pipeline

on:
  push:
    branches:
      - main

jobs:

  # ── Stage 1: Unit Tests ─────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r app/requirements.txt

      - name: Run tests
        run: pytest

  # ── Stage 2: Checkov — IaC Security Scan ────────────────────────────────────
  checkov:
    name: Checkov IaC Scan
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: terraform
          soft_fail: true   # pipeline continues even if findings exist
                            # set to false in production to enforce a hard gate

  # ── Stage 3: Build Docker Image + Trivy Scan ────────────────────────────────
  build-and-scan:
    name: Docker Build & Trivy Scan
    runs-on: ubuntu-latest
    needs: checkov

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t flask-demo:${{ github.sha }} .

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: flask-demo:${{ github.sha }}
          format: table
          exit-code: 0        # same as soft_fail — reports findings, won't block
          severity: CRITICAL,HIGH

  # ── Stage 4: Deploy to EC2 ───────────────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-scan

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          script: |
            # Pull the latest code onto the instance
            if [ -d "devsecops-flask-pipeline" ]; then
              cd devsecops-flask-pipeline && git pull
            else
              git clone https://github.com/${{ github.repository }}.git
              cd devsecops-flask-pipeline
            fi

            # Build the image directly on the instance
            docker build -t flask-demo:latest .

            # Swap the running container with zero manual steps
            docker stop flask-app 2>/dev/null || true
            docker rm flask-app 2>/dev/null || true

            docker run -d \
              --name flask-app \
              --restart unless-stopped \
              -p 80:5000 \
              flask-demo:latest
